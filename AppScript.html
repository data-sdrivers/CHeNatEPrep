<script>
'use strict';
// ============================================================
//  CHeNatEPrep Platform — AppScript.html
//  Developed by DSD (Data Solution Drivers)
//  Frontend SPA: auth, dashboard, exam, result, review, calc.
//
//  Load strategy (3-phase, targets <3 s to interactive):
//  Phase 1 (0 ms)  — Render login or cached page instantly.
//  Phase 2 (bg)    — server_bootstrap verifies session silently.
//  Phase 3 (bg)    — Exam resume / page correction if needed.
// ============================================================

// ── Performance monitor ──────────────────────────────────────
var Perf = {
  start: Date.now(),
  log: function (msg) {
    try {
      var ts    = new Date().toISOString().slice(11, 19);
      var entry = '[CHeNatEPrep ' + ts + '] ' + msg;
      console.log(entry);
      var logs  = JSON.parse(sessionStorage.getItem('chn_perf') || '[]');
      logs.push(entry);
      if (logs.length > 30) logs = logs.slice(-30);
      sessionStorage.setItem('chn_perf', JSON.stringify(logs));
    } catch (e) {}
  },
  elapsed: function () { return (Date.now() - Perf.start) + 'ms'; }
};
Perf.log('Script parsed');

// ── google.script.run bridge ─────────────────────────────────
function api(name, data) {
  return new Promise(function (resolve, reject) {
    var runner = google.script.run
      .withSuccessHandler(function (r) {
        if (r === null || r === undefined)
          return reject(new Error('Server returned no data for: ' + name));
        resolve(r);
      })
      .withFailureHandler(function (e) {
        reject(new Error(e && e.message ? e.message : 'Server error: ' + name));
      });
    var fn = 'server_' + name;
    if (typeof runner[fn] !== 'function')
      return reject(new Error('Unknown function: ' + fn));
    data != null ? runner[fn](data) : runner[fn]();
  });
}

// ── App state ────────────────────────────────────────────────
var State = {
  user:      null,
  page:      'login',
  exam:      null,
  result:    null,
  review:    null,
  papers:    [],
  attempts:  [],
  analytics: null
};

// ── Local storage helpers ────────────────────────────────────
var LS = {
  set: function (k, v) { try { localStorage.setItem('chn_' + k, JSON.stringify(v)); } catch (e) {} },
  get: function (k)    { try { var r = localStorage.getItem('chn_' + k); return r ? JSON.parse(r) : null; } catch (e) { return null; } },
  del: function (k)    { try { localStorage.removeItem('chn_' + k); } catch (e) {} }
};

// Exam state is mirrored to both localStorage (survives tab close)
// and sessionStorage (survives same-tab refresh) for maximum resilience.
var ExamStore = {
  save: function () {
    if (!State.exam) return ExamStore.clear();
    var s = JSON.stringify(State.exam);
    try { localStorage.setItem('chn_exam', s); }   catch (e) {}
    try { sessionStorage.setItem('chn_exam', s); }  catch (e) {}
  },
  load: function () {
    try {
      var raw = localStorage.getItem('chn_exam') || sessionStorage.getItem('chn_exam');
      if (raw) { State.exam = JSON.parse(raw); return true; }
    } catch (e) {}
    return false;
  },
  clear: function () {
    try { localStorage.removeItem('chn_exam'); }  catch (e) {}
    try { sessionStorage.removeItem('chn_exam'); } catch (e) {}
  }
};

window.addEventListener('beforeunload', function () {
  if (State.exam && State.page === 'exam') ExamStore.save();
});

// ── Router ───────────────────────────────────────────────────
var _timerInterval      = null;
var _autosaveInterval   = null;
var _paperCheckInterval = null;

function navigate(page, payload) {
  if (page !== 'exam') {
    if (_timerInterval)      { clearInterval(_timerInterval);      _timerInterval      = null; }
    if (_autosaveInterval)   { clearInterval(_autosaveInterval);   _autosaveInterval   = null; }
    if (_paperCheckInterval) { clearInterval(_paperCheckInterval); _paperCheckInterval = null; }
  }
  State.page = page;
  if (payload) Object.assign(State, payload);
  if (page !== 'login') LS.set('page', page); else LS.del('page');
  render();
}

// ── Bootstrap (three-phase) ──────────────────────────────────
window.addEventListener('load', function () {
  var root   = document.getElementById('root');
  var splash = document.getElementById('splash');

  // ── Phase 1: Instant render from localStorage cache ──────
  calcInit();
  splash.style.display = 'none';
  root.style.display   = 'block';

  var cached    = LS.get('user');
  var lastPage  = LS.get('page');
  var validPage = { dashboard:1, analytics:1, result:1, review:1, exam:1 };

  if (cached) {
    State.user = cached;
    var hasExam = !!(localStorage.getItem('chn_exam') || sessionStorage.getItem('chn_exam'));
    if (hasExam && ExamStore.load() && State.exam) {
      State.page = 'exam';
    } else {
      State.page = (lastPage && validPage[lastPage]) ? lastPage : 'dashboard';
    }
  } else {
    State.page = 'login';
  }
  render();
  Perf.log('Phase 1: ' + Perf.elapsed());

  // ── Phase 2: Background session verification ─────────────
  api('bootstrap')
    .then(function (r) {
      Perf.log('Bootstrap RTT: ' + Perf.elapsed());

      if (!r || !r.ok) {
        // Session invalid — redirect to login if not mid-exam
        if (cached && State.page !== 'exam') {
          LS.del('user'); LS.del('page');
          State.user = null;
          navigate('login');
        }
        return;
      }

      State.user = r.user;
      LS.set('user', r.user);

      if (r.user.role === 'admin') {
        if (State.page !== 'admin') navigate('admin');
        return;
      }

      // ── Phase 3: Exam recovery & page correction ─────────
      _handleResume(r);
    })
    .catch(function (e) {
      Perf.log('Bootstrap error: ' + e.message + ' — cached state retained');
    });
});

function _handleResume(boot) {
  var resume = boot.resume;

  if (resume && resume.ok && resume.attempt) {
    // Merge server answers with local (local is newer than 30s autosave)
    var server  = resume.savedAnswers || {};
    var local   = {};
    try {
      var raw = localStorage.getItem('chn_exam') || sessionStorage.getItem('chn_exam');
      if (raw) {
        var le = JSON.parse(raw);
        if (le && le.attemptID === resume.attempt.attemptID) local = le.answers || {};
      }
    } catch (e) {}
    var merged = {};
    Object.keys(server).forEach(function (k) { merged[k] = server[k]; });
    Object.keys(local).forEach(function (k)  { merged[k] = local[k];  });

    State.exam = Object.assign({}, resume.attempt, {
      questions: resume.questions, answers: merged, current: 0
    });
    State.exam._serverRemainingSecs = resume.attempt.remainingSecs;
    ExamStore.save();
    navigate('exam');
    return;
  }

  if (boot.resumeReason === 'paper_inactive') {
    ExamStore.clear();
    navigate('dashboard');
    setTimeout(function () {
      alert('Your exam has been deactivated by the administrator.');
    }, 300);
    return;
  }

  if (ExamStore.load() && State.exam) { navigate('exam'); return; }

  var lp = LS.get('page');
  var valid = { dashboard:1, analytics:1, result:1, review:1 };
  navigate((lp && valid[lp]) ? lp : 'dashboard');
}

// ── Render ───────────────────────────────────────────────────
function render() {
  var root = document.getElementById('root');
  if (!root) return;
  switch (State.page) {
    case 'login':     root.innerHTML = renderLogin();                         break;
    case 'dashboard': root.innerHTML = renderDashboard();  loadDashboard();   break;
    case 'exam':      root.innerHTML = renderExamPage();   initExam();        break;
    case 'result':    root.innerHTML = renderResult();                        break;
    case 'review':    root.innerHTML = renderReview();                        break;
    case 'analytics': root.innerHTML = renderAnalytics();  loadAnalytics();   break;
    case 'admin':     root.innerHTML = renderAdmin();      loadAdmin();       break;
    default:          root.innerHTML = renderLogin();
  }
  calcEnsureVisible();
}

// Returns ISO date string for the latest valid DOB (must be >= 15 years old)
function _maxDob() {
  var d = new Date();
  d.setFullYear(d.getFullYear() - 15);
  return d.toISOString().slice(0, 10);
}

// Nigerian states as <option> elements
function _nigerianStates() {
  var states = [
    'Abia','Adamawa','Akwa Ibom','Anambra','Bauchi','Bayelsa','Benue','Borno',
    'Cross River','Delta','Ebonyi','Edo','Ekiti','Enugu','FCT Abuja','Gombe',
    'Imo','Jigawa','Kaduna','Kano','Katsina','Kebbi','Kogi','Kwara','Lagos',
    'Nasarawa','Niger','Ogun','Ondo','Osun','Oyo','Plateau','Rivers','Sokoto',
    'Taraba','Yobe','Zamfara'
  ];
  return '<option value="">-- Select State --</option>' +
    states.map(function (s) { return '<option value="' + s + '">' + s + '</option>'; }).join('');
}

function _fldEmail(id, ph) {
  return '<div class="form-group"><label>Email Address</label>' +
    '<input type="email" id="' + id + '" placeholder="' + ph + '" autocomplete="email"/></div>';
}
function _fldPw(id, ph) {
  return '<div class="form-group"><label>Password <span style="font-size:11px;color:var(--muted)">(min. 6 chars)</span></label>' +
    '<div class="pw-wrap">' +
    '<input type="password" id="' + id + '" placeholder="' + ph + '"/>' +
    '<button type="button" class="pw-toggle" onclick="togglePw(\'' + id + '\',this)">&#128065;</button>' +
    '</div></div>';
}

// Enter-key support on auth inputs
document.addEventListener('keydown', function (e) {
  if (e.key !== 'Enter') return;
  var id = document.activeElement ? document.activeElement.id : '';
  if (id === 'login-email' || id === 'login-pw')          { e.preventDefault(); doLogin(); }
  if (id === 'reg-name' || id === 'reg-email')             { e.preventDefault(); doRegister(); }
  if (id === 'setpw-new' || id === 'setpw-confirm')        { e.preventDefault(); doSetPassword(); }
});

function authTab(tab, el) {
  document.querySelectorAll('.auth-tab').forEach(function (t) { t.classList.remove('active'); });
  el.classList.add('active');
  _show('login-form',    tab === 'login');
  _show('register-form', tab === 'register');
  _show('setpw-form',    false);
  _msg('auth-msg', '');
}

function togglePw(inputId, btn) {
  var inp = document.getElementById(inputId);
  if (!inp) return;
  inp.type    = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '&#128065;' : '&#128584;';
}

function doLogin() {
  var email = _val('login-email');
  var pw    = _val('login-pw');
  if (!email) return _authErr('Please enter your email address.');
  _btnBusy('login-btn', 'Signing in\u2026');
  var t0 = Date.now();
  api('login', { email: email, password: pw })
    .then(function (r) {
      Perf.log('login: ' + (Date.now() - t0) + 'ms');
      if (!r || !r.ok) {
        // Reveal password field if account exists but pw needed
        if (r && r.needsPassword) { _show('pw-group', true); }
        return _authErr(r ? r.error : 'No server response.');
      }
      if (r.needsPassword) { State.user = r.user; _showSetPwForm(); return; }
      State.user = r.user;
      LS.set('user', r.user);
      navigate(r.user.role === 'admin' ? 'admin' : 'dashboard');
    })
    .catch(function (e) { _authErr(e.message); })
    .finally(function () { _btnReset('login-btn', 'Sign In \u2192'); });
}

function _showSetPwForm() {
  _show('login-form', false);
  _show('setpw-form', true);
}

function doSetPassword() {
  var np = _val('setpw-new'), cp = _val('setpw-confirm');
  if (np.length < 6) return _authErr('Password must be at least 6 characters.');
  if (np !== cp)     return _authErr('Passwords do not match.');
  _btnBusy('setpw-btn', 'Saving\u2026');
  api('setPassword', { email: State.user.email, password: np })
    .then(function (r) {
      if (!r || !r.ok) return _authErr(r ? r.error : 'Error saving password.');
      LS.set('user', State.user);
      navigate(State.user.role === 'admin' ? 'admin' : 'dashboard');
    })
    .catch(function (e) { _authErr(e.message); })
    .finally(function () { _btnReset('setpw-btn', 'Set Password & Continue \u2192'); });
}

// Enables/disables the Create Account button based on consent checkbox
function _updateRegBtn() {
  var cb  = document.getElementById('reg-consent');
  var btn = document.getElementById('reg-btn');
  if (btn) btn.disabled = !(cb && cb.checked);
}

function doRegister() {
  var name        = _val('reg-name');
  var email       = _val('reg-email');
  var cadre       = _val('reg-cadre');
  var sex         = _val('reg-sex');
  var dob         = _val('reg-dob');
  var school      = _val('reg-school');
  var state       = _val('reg-state');
  var nationality = _val('reg-nationality');
  var referral    = _val('reg-referral');   // optional
  var pw          = _val('reg-pw');
  var pw2         = _val('reg-pw2');
  var consent     = document.getElementById('reg-consent');

  // Client-side validation (mirrors server for instant feedback)
  if (!name)        return _authErr('Full name is required.');
  if (!email)       return _authErr('Email address is required.');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return _authErr('Enter a valid email address.');
  if (!sex)         return _authErr('Please select your sex.');
  if (!dob)         return _authErr('Date of birth is required.');
  if (!cadre)       return _authErr('Please select your cadre.');
  if (!school)      return _authErr('School name is required.');
  if (!state)       return _authErr('Please select your state.');
  if (!nationality) return _authErr('Nationality is required.');
  if (pw.length < 6) return _authErr('Password must be at least 6 characters.');
  if (pw !== pw2)   return _authErr('Passwords do not match.');
  if (!consent || !consent.checked)
    return _authErr('You must agree to the Terms, Conditions, and Privacy Policy to register.');

  _btnBusy('reg-btn', 'Registering\u2026');
  api('register', {
    fullName:     name,
    email:        email,
    cadre:        cadre,
    password:     pw,
    sex:          sex,
    dob:          dob,
    schoolName:   school,
    state:        state,
    nationality:  nationality,
    hearAboutUs:  referral
  })
    .then(function (r) {
      if (!r || !r.ok) return _authErr(r ? r.error : 'No server response.');
      State.user = r.user;
      LS.set('user', r.user);
      navigate('dashboard');
    })
    .catch(function (e) { _authErr(e.message); })
    .finally(function () {
      var btn = document.getElementById('reg-btn');
      if (btn) { btn.disabled = false; btn.textContent = 'Create Account \u2192'; }
    });
}

function doForgotPw() {
  var email = (document.getElementById('forgot-email') || {}).value || '';
  email = email.trim();
  var msgEl = document.getElementById('forgot-msg');
  var btn   = document.getElementById('forgot-btn');
  if (!email) {
    if (msgEl) msgEl.innerHTML = '<div class="alert alert-error mt-8">&#9888; Please enter your email address.</div>';
    return;
  }
  if (btn)   { btn.disabled = true; btn.textContent = 'Sending\u2026'; }
  if (msgEl) msgEl.innerHTML = '<div class="alert alert-info mt-8">Sending\u2026</div>';

  api('resetPassword', { email: email })
    .then(function (r) {
      if (!r || !r.ok) {
        if (msgEl) msgEl.innerHTML = '<div class="alert alert-error mt-8">&#9888; ' + (r ? r.error : 'Error') + '</div>';
        if (btn)   { btn.disabled = false; btn.textContent = 'Send Temporary Password'; }
        return;
      }
      if (msgEl) msgEl.innerHTML =
        '<div class="alert alert-success mt-8">&#10003; ' + r.message + '</div>' +
        (r.emailSent === false
          ? '<div class="alert alert-warn mt-8">&#9888; Email delivery failed. Contact your administrator.</div>'
          : '');
      // Disable the button to prevent repeated submissions
      if (btn) btn.textContent = 'Sent';
    })
    .catch(function (e) {
      if (msgEl) msgEl.innerHTML = '<div class="alert alert-error mt-8">&#9888; ' + e.message + '</div>';
      if (btn)   { btn.disabled = false; btn.textContent = 'Send Temporary Password'; }
    });
}

function doSubmitContact() {
  var name    = _val('ct-name');
  var email   = _val('ct-email');
  var subject = _val('ct-subject');
  var message = _val('ct-msg');
  var result  = document.getElementById('ct-result');
  var btn     = document.getElementById('ct-btn');

  if (!name || !email || !message) {
    if (result) result.innerHTML = '<div class="alert alert-error mt-8">&#9888; Name, email, and message are required.</div>';
    return;
  }
  if (message.length < 10) {
    if (result) result.innerHTML = '<div class="alert alert-error mt-8">&#9888; Message is too short. Please provide more detail.</div>';
    return;
  }

  if (btn)    { btn.disabled = true; btn.textContent = 'Sending…'; }
  if (result) result.innerHTML = '<div class="alert alert-info mt-8">Sending your message…</div>';

  api('submitContact', { name: name, email: email, subject: subject, message: message })
    .then(function (r) {
      if (!r || !r.ok) {
        if (result) result.innerHTML = '<div class="alert alert-error mt-8">&#9888; ' + (r ? r.error : 'Error sending message.') + '</div>';
        if (btn)    { btn.disabled = false; btn.textContent = 'Send Message'; }
        return;
      }
      if (result) result.innerHTML = '<div class="alert alert-success mt-8">&#10003; ' + r.message + '</div>';
      if (btn)    btn.textContent = 'Sent ✓';
    })
    .catch(function (e) {
      if (result) result.innerHTML = '<div class="alert alert-error mt-8">&#9888; ' + e.message + '</div>';
      if (btn)    { btn.disabled = false; btn.textContent = 'Send Message'; }
    });
}

function doChangePw() {

function renderDashboard() {
  return renderShell('dashboard',
    '<div class="page-title">Welcome, ' + ((State.user.fullName || '').split(' ')[0]) + '! &#128075;</div>' +
    '<div class="page-sub">Select a paper to begin your practice session or mock exam.</div>' +
    '<div id="dash-content"><div class="spinner"></div></div>'
  );
}

function loadDashboard() {
  Promise.all([
    api('getPapers',     { cadre: State.user.cadre }),
    api('getMyAttempts', { email: State.user.email })
  ]).then(function (res) {
    State.papers   = (res[0] && res[0].papers)   || [];
    State.attempts = (res[1] && res[1].attempts) || [];
    var el = document.getElementById('dash-content');
    if (el) el.innerHTML = renderPaperList();
  }).catch(function (e) {
    var el = document.getElementById('dash-content');
    if (el) el.innerHTML = '<div class="alert alert-error">Failed to load: ' + e.message + '</div>';
  });
}

function renderPaperList() {
  if (!State.papers.length)
    return '<div class="empty-state"><div class="empty-title">No Papers Available</div>' +
           '<div class="empty-sub">No exam papers found for ' + State.user.cadre + '. Contact your administrator.</div></div>';

  var cards = State.papers.map(function (p) {
    var pid        = p.PaperID;
    var myAttempts = State.attempts.filter(function (a) { return a.PaperID === pid; });
    var count      = myAttempts.length;
    var best       = count ? Math.max.apply(null, myAttempts.map(function (a) { return a.percent || 0; })) : null;
    var qCount     = Number(p.questionCount) || 0;
    var isActive   = p.Active !== false && String(p.Active).toUpperCase() !== 'FALSE';

    // Inactive paper
    if (!isActive) {
      return '<div class="paper-card ' + p.Cadre + ' paper-unavailable">' +
        '<div class="paper-cadre">' + p.Cadre + ' &mdash; Examination</div>' +
        '<div class="paper-title">' + p.Title + '</div>' +
        '<div class="paper-status-badge status-inactive">&#128683; Not Available</div>' +
        '<p class="paper-status-note">This exam has been temporarily deactivated by the administrator.</p>' +
      '</div>';
    }

    // Active but no questions
    if (qCount === 0) {
      return '<div class="paper-card ' + p.Cadre + ' paper-no-questions">' +
        '<div class="paper-cadre">' + p.Cadre + ' &mdash; Examination</div>' +
        '<div class="paper-title">' + p.Title + '</div>' +
        '<div class="paper-meta"><span>' + _ico('clock') + ' ' + (p.Duration || 60) + ' min</span></div>' +
        '<div class="paper-status-badge status-no-qs">&#9888; Questions Not Available</div>' +
        '<p class="paper-status-note">No questions loaded yet. Please check back later.</p>' +
      '</div>';
    }

    // Available paper
    return '<div class="paper-card ' + p.Cadre + '">' +
      '<div class="paper-cadre">' + p.Cadre + ' &mdash; Examination</div>' +
      '<div class="paper-title">' + p.Title + '</div>' +
      '<div class="paper-meta">' +
        '<span>' + _ico('book')  + ' ' + qCount + ' Questions</span>' +
        '<span>' + _ico('clock') + ' ' + (p.Duration || 60) + ' min</span>' +
      '</div>' +
      (count
        ? '<div class="mt-8 text-sm">Best: <strong style="color:' + (best>=50?'var(--success)':'var(--danger)') + '">' + best + '%</strong> &bull; ' + count + ' attempt' + (count>1?'s':'') + '</div>'
        : '<div class="mt-8 text-muted text-sm">Not attempted yet</div>') +
      '<div class="paper-actions">' +
        '<button class="btn btn-primary btn-sm" onclick="beginExam(\'' + pid + '\')">' + (count ? 'Retake' : 'Start') + ' Exam &rarr;</button>' +
        (count ? ' <button class="btn btn-outline btn-sm" onclick="showHistory(\'' + pid + '\')">History (' + count + ')</button>' : '') +
      '</div>' +
    '</div>';
  }).join('');

  return (
    '<div class="paper-grid">' + cards + '</div>' +
    '<div class="mt-24"><div class="card">' +
      '<div class="card-title">Recent Attempts</div>' +
      _attemptsTable(State.attempts.slice(0, 10)) +
    '</div></div>'
  );
}

function _attemptsTable(attempts) {
  if (!attempts.length) return '<p class="text-muted text-center" style="padding:20px">No attempts yet.</p>';
  var rows = attempts.map(function (a) {
    return '<tr>' +
      '<td>' + (a.paperTitle || a.PaperID || '') + '</td>' +
      '<td>#' + (a.attemptNumber || '') + '</td>' +
      '<td>' + (a.score || 0) + '/' + (a.total || 0) + '</td>' +
      '<td><strong style="color:' + (a.percent>=50?'var(--success)':'var(--danger)') + '">' + a.percent + '%</strong></td>' +
      '<td><span class="badge ' + (a.passed?'badge-teal':'badge-admin') + '">' + (a.passed?'PASS':'FAIL') + '</span></td>' +
      '<td>' + fmtDate(a.startTime) + '</td>' +
    '</tr>';
  }).join('');
  return '<div class="table-wrap"><table>' +
    '<thead><tr><th>Paper</th><th>Attempt</th><th>Score</th><th>%</th><th>Result</th><th>Date</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table></div>';
}

function showHistory(paperID) {
  var paper    = State.papers.find(function (p) { return p.PaperID === paperID; });
  var filtered = State.attempts.filter(function (a) { return a.PaperID === paperID; });
  showModal((paper ? paper.Title : 'Attempt') + ' \u2014 History', _attemptsTable(filtered));
}

function beginExam(paperID) {
  var paper = State.papers.find(function (p) { return p.PaperID === paperID; });
  if (paper) {
    var active = paper.Active !== false && String(paper.Active).toUpperCase() !== 'FALSE';
    if (!active)                         return alert('This exam is not currently available.');
    if ((Number(paper.questionCount)||0) === 0) return alert('No questions are available for this exam yet.');
  }
  if (!confirm('Start a timed exam? The clock starts immediately. Ready?')) return;
  var btn = event.currentTarget || event.target;
  if (btn) { btn.disabled = true; btn.textContent = 'Loading\u2026'; }
  api('startExam', { email: State.user.email, paperID: paperID })
    .then(function (r) {
      if (!r || !r.ok) {
        if (btn) { btn.disabled = false; btn.textContent = 'Start Exam \u2192'; }
        return alert('Could not start: ' + (r ? r.error : 'No server response'));
      }
      State.exam = Object.assign({}, r.attempt, { questions: r.questions, answers: {}, current: 0 });
      ExamStore.save();
      navigate('exam');
    })
    .catch(function (e) { if (btn) btn.disabled = false; alert('Failed: ' + e.message); });
}

var _submitting = false;
var _saveTimer  = null;

function renderExamPage() {
  return renderShell('exam', '<div class="exam-wrap" id="exam-root"><div class="spinner"></div></div>');
}

function initExam() {
  if (!State.exam) { navigate('dashboard'); return; }
  _submitting = false;
  renderExamUI();
  startTimer();
}

function renderExamUI() {
  var exam     = State.exam;
  var q        = exam.questions[exam.current];
  var total    = exam.questions.length;
  var answered = Object.keys(exam.answers).length;
  var root     = document.getElementById('exam-root');
  if (!root || !q) return;

  var opts = ['A','B','C','D'].map(function (k) {
    var text = q['Option' + k];
    if (!text) return '';
    var sel = exam.answers[exam.current] === k;
    return '<div class="option-label' + (sel?' selected':'') + '" onclick="selectAnswer(\'' + k + '\')">' +
      '<div class="option-key">' + k + '</div>' +
      '<div class="option-text">' + text + '</div>' +
    '</div>';
  }).join('');

  var dots = exam.questions.map(function (_, i) {
    var cls = 'q-dot' + (exam.answers[i]!==undefined?' answered':'') + (i===exam.current?' current':'');
    return '<div class="' + cls + '" onclick="goQ(' + i + ')">' + (i+1) + '</div>';
  }).join('');

  var pct    = total ? Math.round((answered/total)*100) : 0;
  var isLast = exam.current === total - 1;

  root.innerHTML = (
    '<div class="exam-header">' +
      '<div>' +
        '<div class="exam-title">' + exam.paperTitle + '</div>' +
        '<div class="exam-meta">' + exam.cadre + ' &bull; Attempt #' + exam.attemptNumber + ' &bull; ' + total + ' Qs</div>' +
      '</div>' +
      '<div class="timer-wrap"><div class="timer-label">Time Remaining</div><div class="timer" id="exam-timer">--:--</div></div>' +
    '</div>' +
    '<div class="progress-wrap">' +
      '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="progress-text">' + answered + ' of ' + total + ' answered</div>' +
    '</div>' +
    '<div class="exam-body">' +
      '<div class="exam-main">' +
        '<div class="question-card">' +
          '<div class="question-num">Question ' + (exam.current+1) + ' of ' + total + '</div>' +
          '<div class="question-text">' + q.QuestionText + '</div>' +
          '<div class="options">' + opts + '</div>' +
        '</div>' +
        '<div class="exam-nav">' +
          '<button class="btn btn-outline" onclick="prevQ()"' + (exam.current===0?' disabled':'') + '>&larr; Prev</button>' +
          '<div style="display:flex;gap:8px">' +
            (isLast
              ? '<button class="btn btn-teal" onclick="confirmSubmit()">Submit &#10003;</button>'
              : '<button class="btn btn-primary" onclick="nextQ()">Next &rarr;</button>') +
            '<button class="btn btn-danger btn-sm" onclick="confirmSubmit()">Finish</button>' +
          '</div>' +
        '</div>' +
        (answered < total && isLast ? '<div class="alert alert-warn mt-16">&#9888; ' + (total-answered) + ' unanswered question(s). You may still submit.</div>' : '') +
      '</div>' +
      '<aside class="exam-sidebar">' +
        '<div class="exam-sidebar-title">Questions</div>' +
        '<div class="q-legend">' +
          '<span class="q-dot answered" style="width:18px;height:18px;font-size:9px;pointer-events:none"></span>&thinsp;Done' +
          '&ensp;<span class="q-dot current"  style="width:18px;height:18px;font-size:9px;pointer-events:none"></span>&thinsp;Now' +
        '</div>' +
        '<div class="question-grid">' + dots + '</div>' +
        '<div class="exam-sidebar-stats">' +
          '<span class="stat-pill answered-pill">' + answered + ' done</span>' +
          '<span class="stat-pill pending-pill">' + (total-answered) + ' left</span>' +
        '</div>' +
      '</aside>' +
    '</div>'
  );
}

function selectAnswer(key) {
  State.exam.answers[State.exam.current] = key;
  ExamStore.save();                                  // immediate local save
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_serverSave, 5000);        // server save after 5 s idle
  renderExamUI();
}
function nextQ() { State.exam.current = Math.min(State.exam.current+1, State.exam.questions.length-1); renderExamUI(); }
function prevQ() { State.exam.current = Math.max(State.exam.current-1, 0); renderExamUI(); }
function goQ(i)  { State.exam.current = i; renderExamUI(); }

// ── Timer ────────────────────────────────────────────────────
function startTimer() {
  if (_timerInterval) clearInterval(_timerInterval);

  // Calibrate endTime from server-provided remaining seconds
  if (State.exam._serverRemainingSecs !== undefined) {
    State.exam.endTime = new Date(Date.now() + State.exam._serverRemainingSecs * 1000).toISOString();
    delete State.exam._serverRemainingSecs;
    ExamStore.save();
  }

  _timerInterval = setInterval(function () {
    var el = document.getElementById('exam-timer');
    if (!el) { clearInterval(_timerInterval); _timerInterval = null; return; }
    var remaining = new Date(State.exam.endTime) - Date.now();
    if (remaining <= 0) {
      clearInterval(_timerInterval); _timerInterval = null;
      el.textContent = '00:00'; el.className = 'timer danger';
      doSubmitExam(true);    // auto-submit, no user action needed
      return;
    }
    var m = Math.floor(remaining / 60000);
    var s = Math.floor((remaining % 60000) / 1000);
    el.textContent = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    el.className   = 'timer' + (remaining<60000?' danger':remaining<300000?' warn':'');
  }, 1000);

  // Background server autosave every 30 seconds
  if (_autosaveInterval) clearInterval(_autosaveInterval);
  _autosaveInterval = setInterval(_serverSave, 30000);

  // Real-time paper deactivation check every 60 seconds
  if (_paperCheckInterval) clearInterval(_paperCheckInterval);
  _paperCheckInterval = setInterval(function () {
    if (!State.exam || !State.exam.paperID) return;
    api('checkPaperActive', { paperID: State.exam.paperID })
      .then(function (r) {
        if (r && r.ok && r.active === false) {
          clearInterval(_timerInterval);      _timerInterval      = null;
          clearInterval(_autosaveInterval);   _autosaveInterval   = null;
          clearInterval(_paperCheckInterval); _paperCheckInterval = null;
          ExamStore.clear();
          State.exam = null;
          navigate('dashboard');
          setTimeout(function () {
            alert('This exam has been deactivated. Your progress was saved.');
          }, 300);
        }
      })
      .catch(function () {}); // silent — try again next cycle
  }, 60000);
}

function _serverSave() {
  if (!State.exam || !State.user) return;
  api('autosaveExam', {
    attemptID:   State.exam.attemptID,
    email:       State.user.email,
    answersJSON: JSON.stringify(State.exam.answers || {})
  }).then(function (r) {
    if (r && r.reason === 'already_submitted') {
      clearInterval(_autosaveInterval); _autosaveInterval = null;
    }
  }).catch(function () {});
}

function confirmSubmit() {
  var total = State.exam.questions.length;
  var ans   = Object.keys(State.exam.answers).length;
  var msg   = ans < total
    ? 'You have ' + (total - ans) + ' unanswered question(s). Submit anyway?'
    : 'Submit ' + total + ' answers now?';
  if (confirm(msg)) doSubmitExam(false);
}

function doSubmitExam(auto) {
  if (_submitting) return;
  _submitting = true;
  if (_timerInterval)      { clearInterval(_timerInterval);      _timerInterval      = null; }
  if (_autosaveInterval)   { clearInterval(_autosaveInterval);   _autosaveInterval   = null; }
  if (_paperCheckInterval) { clearInterval(_paperCheckInterval); _paperCheckInterval = null; }

  var exam      = State.exam;
  var responses = exam.questions.map(function (q, i) {
    return { questionID: q.QuestionID, selected: exam.answers[i] || null };
  });

  _overlay(auto ? 'Time is up \u2014 submitting your exam\u2026' : 'Submitting your exam\u2026');

  api('submitExam', { attemptID: exam.attemptID, email: State.user.email, responses: responses })
    .then(function (r) {
      _submitting = false;
      _overlayOff();
      if (!r || !r.ok) {
        alert('Submission error: ' + (r ? r.error : 'No response. Answers saved locally.'));
        return;
      }
      ExamStore.clear();
      State.result = r.result;
      State.exam   = null;
      navigate('result');
    })
    .catch(function (e) {
      _submitting = false;
      _overlayOff();
      alert('Network error: ' + e.message + '\nAnswers preserved \u2014 please try again.');
    });
}

function _overlay(msg) {
  var old = document.getElementById('_sub-overlay');
  if (old) old.remove();
  var d = document.createElement('div');
  d.id = '_sub-overlay';
  d.style.cssText = 'position:fixed;inset:0;background:rgba(6,74,130,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;color:#fff;font-family:system-ui,sans-serif';
  d.innerHTML =
    '<div style="width:52px;height:52px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:24px"></div>' +
    '<div style="font-size:18px;font-weight:700;margin-bottom:8px">' + msg + '</div>' +
    '<div style="font-size:13px;opacity:.75">Please wait \u2014 do not close this page</div>';
  document.body.appendChild(d);
}
function _overlayOff() { var el = document.getElementById('_sub-overlay'); if (el) el.remove(); }

// ══════════════════════════════════════════════════════════════
//  RESULT
// ══════════════════════════════════════════════════════════════

function renderResult() {
  var res = State.result;
  if (!res) return renderShell('dashboard', '<p>No result found.</p>');
  var R    = 54;
  var circ = +(2 * Math.PI * R).toFixed(2);
  var fill = +((res.percent / 100) * circ).toFixed(2);
  return renderShell('dashboard',
    '<div class="page-title">Exam Result</div>' +
    '<div class="page-sub">Attempt #' + (res.attemptNumber || '') + '</div>' +
    '<div class="result-hero ' + (res.passed?'pass':'fail') + '">' +
      '<div class="score-ring">' +
        '<svg width="140" height="140" viewBox="0 0 140 140">' +
          '<circle cx="70" cy="70" r="' + R + '" fill="none" stroke="' + (res.passed?'#E8F5E9':'#FFEBEE') + '" stroke-width="12"/>' +
          '<circle cx="70" cy="70" r="' + R + '" fill="none" stroke="' + (res.passed?'#1DB954':'#E53935') + '" stroke-width="12" stroke-dasharray="' + fill + ' ' + circ + '" stroke-linecap="round"/>' +
        '</svg>' +
        '<div class="score-ring-text">' +
          '<div class="score-pct" style="color:' + (res.passed?'var(--success)':'var(--danger)') + '">' + res.percent + '%</div>' +
          '<div class="score-label">' + (res.score||0) + '/' + (res.total||0) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="result-verdict" style="color:' + (res.passed?'var(--success)':'var(--danger)') + '">' +
        (res.passed ? '&#127881; PASS \u2014 Well Done!' : '&#128216; FAIL \u2014 Keep Practising') +
      '</div>' +
      '<div class="result-sub">' + (res.score||0) + ' correct out of ' + (res.total||0) + ' &bull; Pass mark: 50%</div>' +
    '</div>' +
    '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px">' +
      '<button class="btn btn-outline" onclick="navigate(\'dashboard\')">&#8592; My Papers</button>' +
      '<button class="btn btn-primary" id="review-btn" onclick="loadReview()">View Answer Review</button>' +
    '</div>'
  );
}

function loadReview() {
  var btn = document.getElementById('review-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Loading\u2026'; }
  api('getAttemptResult', { attemptID: State.result.attemptID, email: State.user.email })
    .then(function (r) {
      if (!r || !r.ok) {
        alert(r ? r.error : 'Failed to load review.');
        if (btn) { btn.disabled = false; btn.textContent = 'View Answer Review'; }
        return;
      }
      State.review = r.result;
      navigate('review');
    })
    .catch(function (e) { alert('Error: ' + e.message); if (btn) btn.disabled = false; });
}

// ══════════════════════════════════════════════════════════════
//  ANSWER REVIEW
// ══════════════════════════════════════════════════════════════

function renderReview() {
  var res = State.review;
  if (!res) return renderShell('dashboard', '<p>No review data.</p>');

  var cards = (res.detailed || []).map(function (q, i) {
    var opts = ['A','B','C','D'].map(function (k) {
      var text = q['option' + k] || q['Option' + k] || '';
      if (!text) return '';
      var isSel  = q.selected === k;
      var isCorr = q.correct  === k;
      var cls    = isCorr ? 'correct' : (isSel && !isCorr ? 'wrong' : '');
      return '<div class="option-label ' + cls + '" style="cursor:default">' +
        '<div class="option-key">' + k + '</div>' +
        '<div class="option-text">' + text + '</div>' +
      '</div>';
    }).join('');

    return '<div class="question-card" style="margin-bottom:12px">' +
      '<div class="question-num" style="color:' + (q.isCorrect?'var(--success)':'var(--danger)') + '">' +
        (q.isCorrect ? '&#10003; Correct' : '&#10007; Incorrect') + ' \u2014 Q' + (i+1) +
      '</div>' +
      '<div class="question-text" style="text-align:left">' + (q.questionText||'') + '</div>' +
      '<div class="options">' + opts + '</div>' +
      (!q.isCorrect ? '<div class="correct-hint">Correct answer: <strong>' + q.correct + '</strong></div>' : '') +
    '</div>';
  }).join('');

  return renderShell('dashboard',
    '<div class="page-title">Answer Review</div>' +
    '<div class="page-sub">' + (res.paperTitle||'') + '</div>' +
    '<div class="review-summary">' +
      '<span class="badge ' + (res.passed?'badge-teal':'badge-admin') + '" style="font-size:14px;padding:4px 14px">' + (res.passed?'PASS':'FAIL') + '</span>' +
      '&nbsp;&nbsp;Score: <strong>' + res.score + '/' + res.total + '</strong> (' + res.percent + '%)' +
    '</div>' +
    cards +
    '<div style="margin-top:24px;padding-bottom:40px">' +
      '<button class="btn btn-outline" onclick="navigate(\'result\')">&#8592; Back</button>' +
      ' <button class="btn btn-primary" onclick="navigate(\'dashboard\')">My Papers</button>' +
    '</div>'
  );
}

// ══════════════════════════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════════════════════════

function fmtDate(iso) {
  if (!iso) return '\u2014';
  try {
    return new Date(iso).toLocaleString('en-NG', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  } catch (e) { return String(iso); }
}

function showModal(title, body) {
  var old = document.getElementById('_modal');
  if (old) old.remove();
  var d = document.createElement('div');
  d.id = '_modal'; d.className = 'modal-overlay';
  d.innerHTML =
    '<div class="modal">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
        '<div class="modal-title" style="margin-bottom:0">' + title + '</div>' +
        '<button class="btn btn-outline btn-sm" onclick="closeModal()">&#10005;</button>' +
      '</div>' + body +
    '</div>';
  document.body.appendChild(d);
  d.addEventListener('click', function (e) { if (e.target === d) closeModal(); });
}
function closeModal() { var el = document.getElementById('_modal'); if (el) el.remove(); }
</script>
